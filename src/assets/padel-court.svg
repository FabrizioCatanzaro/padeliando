<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="courtBg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#12202b"/>
      <stop offset="1" stop-color="#0a141b"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="600" fill="url(#courtBg)"/>

  <!-- Superficie de la cancha -->
  <rect x="100" y="120" width="1000" height="360" rx="6" fill="#16303f" stroke="#3f6277" stroke-width="4"/>

  <!-- Red (centro) -->
  <line x1="600" y1="120" x2="600" y2="480" stroke="#7fa8bd" stroke-width="5" stroke-dasharray="10 9"/>

  <!-- Líneas de saque -->
  <line x1="250" y1="120" x2="250" y2="480" stroke="#3f6277" stroke-width="4"/>
  <line x1="950" y1="120" x2="950" y2="480" stroke="#3f6277" stroke-width="4"/>

  <!-- Línea central de saque -->
  <line x1="250" y1="300" x2="950" y2="300" stroke="#3f6277" stroke-width="4"/>
</svg>
