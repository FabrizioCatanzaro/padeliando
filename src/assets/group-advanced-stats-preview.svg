  <!-- Bar chart: win rate -->
  <g transform="translate(314, 294)">
    <rect x="0"  y="0"  width="165" height="10" rx="2" fill="#4af07a" opacity="0.85"/>
    <text x="171" y="9" font-size="9" fill="#888">R. Gómez · 71%</text>
    <rect x="0"  y="16" width="153" height="10" rx="2" fill="#4af07a" opacity="0.65"/>
    <text x="171" y="25" font-size="9" fill="#888">P. Díaz · 68%</text>
    <rect x="0"  y="32" width="130" height="10" rx="2" fill="#4af07a" opacity="0.5"/>
    <text x="171" y="41" font-size="9" fill="#888">M. Torres · 57%</text>
    <rect x="0"  y="48" width="104" height="10" rx="2" fill="#4af07a" opacity="0.35"/>
    <text x="171" y="57" font-size="9" fill="#888">L. Fernández · 46%</text>
    <rect x="0"  y="64" width="90"  height="10" rx="2" fill="#4af07a" opacity="0.2"/>
    <text x="171" y="73" font-size="9" fill="#888">C. López · 40%</text>
  </g>

  <!-- Activity label -->
  <text x="14" y="390" font-size="9" fill="#555" letter-spacing="2">PARTIDOS POR TORNEO</text>

  <!-- Activity line -->
  <g transform="translate(14, 398)">
    <polyline
      points="0,12 70,8 140,16 210,4 280,10 350,6 420,14 490,2 560,8"
      fill="none" stroke="#4ab8f0" stroke-width="2"
    />
    <circle cx="0"   cy="12" r="3" fill="#4ab8f0"/>
    <circle cx="70"  cy="8"  r="3" fill="#4ab8f0"/>
    <circle cx="140" cy="16" r="3" fill="#4ab8f0"/>
    <circle cx="210" cy="4"  r="3" fill="#4ab8f0"/>
    <circle cx="280" cy="10" r="3" fill="#4ab8f0"/>
    <circle cx="350" cy="6"  r="3" fill="#4ab8f0"/>
    <circle cx="420" cy="14" r="3" fill="#4ab8f0"/>
    <circle cx="490" cy="2"  r="3" fill="#4ab8f0"/>
    <circle cx="560" cy="8"  r="3" fill="#4ab8f0"/>
