    <rect x="0"  y="32" width="100" height="10" rx="2" fill="#e8f04a" opacity="0.4"/>
    <text x="186" y="41" font-size="9" fill="#888">M. Torres · 3</text>
    <rect x="0"  y="48" width="70"  height="10" rx="2" fill="#e8f04a" opacity="0.25"/>
    <text x="186" y="57" font-size="9" fill="#888">L. Fernández · 2</text>
    <rect x="0"  y="64" width="35"  height="10" rx="2" fill="#e8f04a" opacity="0.15"/>
    <text x="186" y="73" font-size="9" fill="#888">C. López · 1</text>
