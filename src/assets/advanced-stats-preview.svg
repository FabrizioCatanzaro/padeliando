<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380" font-family="monospace, sans-serif">
  <!-- Background -->
  <rect width="600" height="380" rx="8" fill="#111"/>
  <rect width="600" height="380" rx="8" fill="none" stroke="#222" stroke-width="1"/>

  <!-- Header -->
  <text x="20" y="34" font-size="12" fill="#e8f04a" font-weight="bold" letter-spacing="3">ESTADÍSTICAS AVANZADAS</text>

  <!-- Row: Meses activos + Promedio -->
  <rect x="14" y="52" width="275" height="88" rx="6" fill="#0d0d0d" stroke="#222" stroke-width="1"/>
  <text x="30" y="92" font-size="32" fill="white" font-weight="900" font-family="sans-serif">9</text>
  <text x="30" y="110" font-size="9" fill="#444" letter-spacing="3">MESES ACTIVOS</text>
  <text x="30" y="124" font-size="9" fill="#555">últimos 12 meses</text>
  <rect x="30" y="132" width="240" height="2" rx="1" fill="#4ab8f0" opacity="0.35"/>

  <rect x="311" y="52" width="275" height="88" rx="6" fill="#0d0d0d" stroke="#222" stroke-width="1"/>
  <text x="327" y="92" font-size="32" fill="white" font-weight="900" font-family="sans-serif">3.4</text>
  <text x="327" y="110" font-size="9" fill="#444" letter-spacing="3">PROM. PARTIDOS/MES</text>
  <text x="327" y="124" font-size="9" fill="#555">en meses activos</text>
  <rect x="327" y="132" width="240" height="2" rx="1" fill="#e8f04a" opacity="0.35"/>

