      stroke="#e8f04a"
      stroke-width="2"
    />
    <circle cx="0"   cy="42" r="3" fill="#e8f04a"/>
    <circle cx="48"  cy="35" r="3" fill="#e8f04a"/>
    <circle cx="96"  cy="28" r="3" fill="#e8f04a"/>
    <circle cx="144" cy="15" r="3" fill="#e8f04a"/>
    <circle cx="192" cy="30" r="3" fill="#e8f04a"/>
    <circle cx="240" cy="38" r="3" fill="#e8f04a"/>
    <circle cx="288" cy="20" r="3" fill="#e8f04a"/>
    <circle cx="336" cy="10" r="3" fill="#e8f04a"/>
    <circle cx="384" cy="25" r="3" fill="#e8f04a"/>
    <circle cx="432" cy="18" r="3" fill="#e8f04a"/>
    <circle cx="480" cy="32" r="3" fill="#e8f04a"/>
    <circle cx="528" cy="8"  r="3" fill="#e8f04a"/>
  </g>
