    <rect x="48"  y="70" width="28" height="30" rx="2" fill="#4ab8f0" opacity="0.8"/>
    <rect x="96"  y="50" width="28" height="50" rx="2" fill="#4ab8f0" opacity="0.8"/>
    <rect x="144" y="30" width="28" height="70" rx="2" fill="#4ab8f0" opacity="0.8"/>
    <rect x="192" y="55" width="28" height="45" rx="2" fill="#4ab8f0" opacity="0.8"/>
    <rect x="240" y="65" width="28" height="35" rx="2" fill="#4ab8f0" opacity="0.8"/>
    <rect x="288" y="40" width="28" height="60" rx="2" fill="#4ab8f0" opacity="0.8"/>
    <rect x="336" y="25" width="28" height="75" rx="2" fill="#4ab8f0" opacity="0.8"/>
    <rect x="384" y="45" width="28" height="55" rx="2" fill="#4ab8f0" opacity="0.8"/>
    <rect x="432" y="35" width="28" height="65" rx="2" fill="#4ab8f0" opacity="0.8"/>
    <rect x="480" y="55" width="28" height="45" rx="2" fill="#4ab8f0" opacity="0.8"/>
    <rect x="528" y="20" width="28" height="80" rx="2" fill="#4ab8f0" opacity="0.8"/>
    <rect x="14"  y="75" width="28" height="25" rx="2" fill="#4af07a" opacity="0.8"/>
    <rect x="62"  y="80" width="28" height="20" rx="2" fill="#4af07a" opacity="0.8"/>
    <rect x="110" y="65" width="28" height="35" rx="2" fill="#4af07a" opacity="0.8"/>
    <rect x="158" y="50" width="28" height="50" rx="2" fill="#4af07a" opacity="0.8"/>
    <rect x="206" y="68" width="28" height="32" rx="2" fill="#4af07a" opacity="0.8"/>
    <rect x="254" y="75" width="28" height="25" rx="2" fill="#4af07a" opacity="0.8"/>
    <rect x="302" y="58" width="28" height="42" rx="2" fill="#4af07a" opacity="0.8"/>
    <rect x="350" y="42" width="28" height="58" rx="2" fill="#4af07a" opacity="0.8"/>
    <rect x="398" y="60" width="28" height="40" rx="2" fill="#4af07a" opacity="0.8"/>
    <rect x="446" y="50" width="28" height="50" rx="2" fill="#4af07a" opacity="0.8"/>
    <rect x="494" y="70" width="28" height="30" rx="2" fill="#4af07a" opacity="0.8"/>
    <rect x="542" y="38" width="28" height="62" rx="2" fill="#4af07a" opacity="0.8"/>
    <line x1="0" y1="100" x2="572" y2="100" stroke="#1a1a1a" stroke-width="1"/>
  </g>

  <!-- Win rate label -->
  <text x="14" y="308" font-size="9" fill="#555" letter-spacing="2">WIN RATE % POR MES</text>

  <!-- Win rate line chart -->
  <g transform="translate(14, 318)">
    <polyline
      points="0,42 48,35 96,28 144,15 192,30 240,38 288,20 336,10 384,25 432,18 480,32 528,8"
